# Server Configuration
server.port=8080

# Database Connection Settings
spring.datasource.url=jdbc:mysql://localhost:3306/autocabs_db?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=${DB_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Flyway Migration Settings
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true


# Disable Spring Security Form Login default behavior
spring.security.user.name=admin
spring.security.user.password=admin123

# JWT Configuration
jwt.secret=${JWT_SECRET_KEY:default_secret_key_for_dev_only_must_be_64_chars_long_1234}
jwt.expiration=86400000